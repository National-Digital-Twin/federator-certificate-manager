name: Release

env:
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress"

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    # To eventually be replaced with just using the version from the pom
    inputs:
      image_tag:
        description: Tag for the docker image
        required: true
        type: string
      dry_run:
        description: |
          Dry run.
          Toggle for whether to push images or not.
          If toggled then the built images will not be pushed.
        required: false
        default: false
        type: boolean

jobs:
  # Make sure that the current code runs
  verify:
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true &&
      (startsWith(github.head_ref, 'release/') || startsWith(github.head_ref, 'hotfix/'))
    outputs:
      project_version: ${{ steps.get-version.outputs.project_version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Java/Maven
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 21
          distribution: "temurin"
          cache: maven
          server-password: "GH_PACKAGES_PAT"
      - name: Get version
        id: get-version
        run: echo project_version=$(./mvnw $MAVEN_CLI_OPTS help:evaluate -Dexpression=project.version -q -DforceStdout) >> $GITHUB_OUTPUT
      - name: Build packages
        env:
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
        run: ./mvnw $MAVEN_CLI_OPTS package
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        name: Persist server
        id: persist-server
        with:
          name: federator-certificate-manager-${{ steps.get-version.outputs.project_version }}.jar
          path: target/federator-certificate-manager-${{ steps.get-version.outputs.project_version }}.jar
          retention-days: 1


  publish:
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image_tag: ${{ steps.get_version.outputs.version }}
    name: Publish to github packages
    needs: verify
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Java/Maven
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 21
          distribution: "temurin"
          cache: maven
          server-password: "GH_PACKAGES_PAT"
      - name: Build packages
        run: ./mvnw $MAVEN_CLI_OPTS package -DskipTests
      - name: Publish package
        run: ./mvnw $MAVEN_CLI_OPTS package -DskipTests
      - name: get image tag from branch
        id: get_version
        run: |
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          VERSION="${BRANCH#release/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  release-ghcr:
    permissions:
      contents: read
      packages: write
      id-token: write
    name: "Build and release docker images to GHCR with tags '${{ needs.publish.outputs.image_tag }} latest'"
    needs:
      - verify
      - publish
    uses: ./.github/workflows/docker-ghcr.yml
    with:
      image_tag: "${{ needs.publish.outputs.image_tag }},latest"
      jar_version: ${{ needs.verify.outputs.project_version }}
      dry_run: false
      docker_target: federator-certificate-manager

  cleanup:
    permissions:
      contents: read
      packages: write
      id-token: write

    name: Artifact cleanup
    runs-on: ubuntu-latest
    needs:
      - release-ghcr
      - verify
    if: ${{ needs.verify.result == 'success' }}
    steps:
      - uses: geekyeggo/delete-artifact@f275313e70c08f6120db482d7a6b98377786765b # v5
        name: Delete server artifact
        with:
          name: federator-certificate-manager-${{ needs.verify.outputs.project_version }}.jar
