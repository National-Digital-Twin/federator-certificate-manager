name: Release

env:
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress"

on:
  pull_request:
    # types: [closed]
    branches:
      - develop
  workflow_dispatch:
    # To eventually be replaced with just using the version from the pom
    inputs:
      image_tag:
        description: Tag for the docker image
        required: true
        type: string
      dry_run:
        description: |
          Dry run.
          Toggle for whether to push images or not.
          If toggled then the built images will not be pushed.
        required: false
        default: false
        type: boolean

jobs:
  # Make sure that the current code runs
  verify:
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    # if: |
    #   github.event.pull_request.merged == true &&
    #   startsWith(github.head_ref, 'release/') || startsWith(github.head_ref, 'hotfix/'))
    outputs:
      project_version: ${{ steps.get-version.outputs.project_version }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java/Maven
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: "temurin"
          cache: maven
          server-password: "GH_PACKAGES_PAT"
      - name: Get version
        id: get-version
        run: echo project_version=$(./mvnw $MAVEN_CLI_OPTS help:evaluate -Dexpression=project.version -q -DforceStdout) >> $GITHUB_OUTPUT
      - name: Build packages
        env:
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
        run: ./mvnw $MAVEN_CLI_OPTS package
      - uses: actions/upload-artifact@v4
        name: Persist server
        id: persist-server
        with:
          name: federator-certificate-manager-${{ steps.get-version.outputs.project_version }}.jar
          path: target/federator-certificate-manager-${{ steps.get-version.outputs.project_version }}.jar
          retention-days: 1


  publish:
    permissions:
      contents: read
      packages: write
      id-token: write
    name: Publish to github packages
    needs: verify
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java/Maven
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: "temurin"
          cache: maven
          server-password: "GH_PACKAGES_PAT"
      # - name: Build packages
      #   run: ./mvnw $MAVEN_CLI_OPTS package -DskipTests
      # - name: Publish package
      #   run: ./mvnw $MAVEN_CLI_OPTS package -DskipTests

  release-ghcr:
    permissions:
      contents: read
      packages: write
      id-token: write
    name: "Build and release docker images to GHCR with tags '${{ inputs.image_tag }}, latest'"
    needs: verify
    uses: ./.github/workflows/docker-ghcr.yml
    secrets: inherit
    with:
      image_tag: "${{ inputs.image_tag }},latest"
      jar_version: ${{ needs.verify.outputs.project_version }}
      dry_run: false
      docker_target: federator-certificate-manager

  # cleanup:
  #   permissions:
  #     contents: read
  #     packages: write
  #     id-token: write

  #   name: Artifact cleanup
  #   runs-on: ubuntu-latest
  #   needs:
  #     - release-ghcr
  #     - verify
  #   if: ${{ needs.verify.result == 'success' }}
  #   steps:
  #     - uses: geekyeggo/delete-artifact@v5
  #       name: Delete server artifact
  #       with:
  #         name: federator-certificate-manager-${{ needs.verify.outputs.project_version }}.jar
