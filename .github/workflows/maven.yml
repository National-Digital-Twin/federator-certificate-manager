name: Automated tests

on:
  push:
    branches:
      - 'develop'
      - 'main'
  pull_request:
    branches:
      - 'develop'
      - 'main'
  workflow_call:



env:
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress"
  DOCKER_TARGET: federator-certificate-manager
  GITHUB_REPOSITORY: ${{ github.repository }}

jobs:
  build:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          # Full history is recommended for accurate Sonar analysis and PR decoration
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-password: 'GH_PACKAGES_PAT'
      - name: Build and Test
        env:
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
        run: ./mvnw $MAVEN_CLI_OPTS verify
      - name: Code Coverage
        env:
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw $MAVEN_CLI_OPTS verify -Dsonar.projectKey=National-Digital-Twin_federator-certificate-manager -Dsonar.organization=national-digital-twin -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
      - name: Verify JaCoCo XML exists
        run: ls -l target/site/jacoco/jacoco.xml
  lint:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-password: 'GH_PACKAGES_PAT'
      - name: Lint
        env:
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
        run: ./mvnw $MAVEN_CLI_OPTS spotless:check
  security-scanning:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-password: 'GH_PACKAGES_PAT'
    
      - name: Get version
        id: get_version
        run: echo project_version=$(./mvnw $MAVEN_CLI_OPTS help:evaluate -Dexpression=project.version -q -DforceStdout) >> $GITHUB_OUTPUT

      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Login to ghcr.io
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Format repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Get server jar
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          pattern: federator-certificate-manager-*.jar
          path: target
          merge-multiple: true

      - name: Build Server Image
        run: docker build --no-cache --build-arg JAR_NAME="federator-certificate-manager-${{ steps.get_version.outputs.project_version}}" -t ghcr.io/${REPO}/federator-certificate-manager:staged -f "${{ github.workspace }}/docker/Dockerfile" --target ${{ env.DOCKER_TARGET }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/${{ env.REPO }}/federator-certificate-manager:staged
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          trivyignores: .trivyignore
        continue-on-error: false

      - name: Clean up docker image
        run: docker rmi ghcr.io/${REPO}/federator-certificate-manager:staged
